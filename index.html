<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dog Toy Instructions</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { min-height: 100svh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #FFF8F0; font-family: 'Nunito', sans-serif; padding: 1.5rem; }
  .paw-bg { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; opacity: 0.04; font-size: 80px; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 20px; padding: 20px; }
  .card { position: relative; z-index: 1; background: white; border-radius: 28px; padding: 2rem 1.75rem; width: 100%; max-width: 380px; box-shadow: 0 8px 40px rgba(0,0,0,0.10); text-align: center; }
  .step-badge { display: inline-block; background: #FF6B35; color: white; font-size: 13px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; padding: 6px 18px; border-radius: 50px; margin-bottom: 1.25rem; }
  .title { font-size: 1.5rem; font-weight: 900; color: #1a1a1a; margin-bottom: 0.4rem; line-height: 1.2; }
  .subtitle { font-size: 0.9rem; color: #999; margin-bottom: 1.5rem; }
  .dog-emoji { font-size: 2.5rem; margin-bottom: 1rem; display: block; animation: wag 2s ease-in-out infinite; }
  @keyframes wag { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
  .sc-wrap { border-radius: 12px; overflow: hidden; }
  iframe { border: none; border-radius: 12px; }
</style>
</head>
<body>
<div class="paw-bg" id="pawBg"></div>
<div class="card">
  <span class="dog-emoji">🐾</span>
  <div class="step-badge" id="stepBadge">Step —</div>
  <h1 class="title" id="stepTitle">Loading...</h1>
  <p class="subtitle">Tap play to hear the instructions</p>
  <div class="sc-wrap" id="scWrap"></div>
</div>

<script>
const TRACKS = [
  null,
  'https://soundcloud.com/steven-pel/step-1-1',
  'https://soundcloud.com/steven-pel/step-2-3',
  'https://soundcloud.com/steven-pel/step-3-2',
  'https://soundcloud.com/steven-pel/step-4-4',
  'https://soundcloud.com/steven-pel/step-5-5',
  'https://soundcloud.com/steven-pel/step-6-6',
  'https://soundcloud.com/steven-pel/step-7-7',
  'https://soundcloud.com/steven-pel/step-8-8',
  'https://soundcloud.com/steven-pel/step-9-9',
  'https://soundcloud.com/steven-pel/step-10-10',
];

const STEP_NAMES = [
  null,
  'Lay out the t-shirts',
  'Mark & cut the strips',
  'Cut strips flat',
  'Cut the tie strips',
  'Make a cross & add ball',
  'Fold strips around ball',
  'Tie the base knot',
  'Cut into tentacles',
  'Plait the strips',
  'Your toy is ready!',
];

const params = new URLSearchParams(window.location.search);
const step = Math.min(Math.max(parseInt(params.get('step')) || 1, 1), 10);

document.getElementById('stepBadge').textContent = `Step ${step}`;
document.getElementById('stepTitle').textContent = STEP_NAMES[step];

const pawBg = document.getElementById('pawBg');
for (let i = 0; i < 30; i++) pawBg.innerHTML += '🐾';

// Build SoundCloud embed
const trackUrl = encodeURIComponent(TRACKS[step]);
const embedUrl = `https://w.soundcloud.com/player/?url=${trackUrl}&color=%23FF6B35&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false`;

document.getElementById('scWrap').innerHTML = `
  <iframe
    width="100%"
    height="166"
    scrolling="no"
    allow="autoplay"
    src="${embedUrl}">
  </iframe>`;
</script>
</body>
</html>
